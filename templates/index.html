<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SystemPulse Dashboard</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>⚡ SystemPulse Dashboard</h1>

    <button class="run-btn" onclick="startTest()">Run Full Test</button>

    <div class="status" id="status">Idle</div>

    <div class="grid">

        <div class="card">
            <h3>CPU Performance</h3>
            <canvas id="cpuChart"></canvas>
        </div>

        <div class="card">
            <h3>Disk Speed</h3>
            <canvas id="diskChart"></canvas>
        </div>

        <div class="card">
            <h3>Memory</h3>
            <canvas id="memoryChart"></canvas>
        </div>

        <div class="card score-card">
            <h3>Overall Score</h3>
            <div id="score">--</div>
        </div>

    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
